# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Inyectar API Key desde el secret de GitHub ─────────────
      # Reemplaza el placeholder __IA_API_KEY__ en app.js con el
      # valor real del secret antes de subir el artefacto.
      # El secret se llama IA_API_KEY y debe estar configurado en:
      # Settings → Secrets and variables → Actions → New repository secret
      - name: Inject API Key into app.js
        env:
          IA_API_KEY: ${{ secrets.IA_API_KEY }}
        run: |
          sed -i "s|__IA_API_KEY__|${IA_API_KEY}|g" app.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube la carpeta chatbot (donde está index.html)
          path: 'chatbot'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
